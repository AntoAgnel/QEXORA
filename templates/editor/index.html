<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paper Editor – QEXORA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── CSS Variables ── */
:root {
  --bg:       #0e0f14;
  --surface:  #16181f;
  --surface2: #1e2029;
  --border:   #2a2d3a;
  --accent:   #6c63ff;
  --accent2:  #00d4aa;
  --text:     #e8eaf0;
  --muted:    #8a8fa8;
  --hard:     #ff6b6b;
  --radius:   8px;
  --paper-w:  794px;
}
[data-theme="light"] {
  --bg:#f0f2f8; --surface:#fff; --surface2:#f4f5fb;
  --border:#dde0ee; --text:#111827; --muted:#6b7280;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* ── TOP BAR ── */
.topbar {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 1rem;
  gap: 8px;
  flex-shrink: 0;
  z-index: 100;
}
.topbar-logo { font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; letter-spacing:2px; margin-right:12px; }
.topbar-logo span { color:var(--accent); }
.topbar-sep { width:1px; height:24px; background:var(--border); margin:0 6px; }
.topbar-title {
  font-size:0.875rem; font-weight:600; color:var(--text);
  background:none; border:none; outline:none;
  font-family:'DM Sans',sans-serif;
  min-width:180px; max-width:320px;
  border-bottom:1px dashed transparent;
  padding:2px 4px; transition:border-color .2s;
}
.topbar-title:focus { border-bottom-color:var(--accent); }
.topbar-spacer { flex:1; }
.tb-btn {
  display:flex; align-items:center; gap:6px;
  padding:7px 14px; border-radius:7px;
  font-size:0.8rem; font-weight:600;
  cursor:pointer; border:none; font-family:'DM Sans',sans-serif;
  transition:all .18s; white-space:nowrap;
}
.tb-btn-ghost { background:transparent; color:var(--muted); }
.tb-btn-ghost:hover { background:var(--surface2); color:var(--text); }
.tb-btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
.tb-btn-outline:hover { border-color:var(--accent); color:var(--accent); }
.tb-btn-primary { background:var(--accent); color:#fff; }
.tb-btn-primary:hover { background:#5850e8; }
.tb-btn-success { background:var(--accent2); color:#000; }
.tb-btn-success:hover { filter:brightness(1.1); }
.tb-btn svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

/* ── MAIN LAYOUT ── */
.editor-layout { flex:1; display:flex; overflow:hidden; }

/* ── LEFT PANEL – Add Blocks ── */
.left-panel {
  width: 200px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
}
.left-panel-title { font-size:0.68rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); padding:12px 14px 6px; font-weight:700; }
.block-btn {
  display:flex; align-items:center; gap:10px;
  padding:9px 14px; cursor:pointer;
  font-size:0.82rem; color:var(--muted);
  transition:all .15s; border:none; background:none;
  text-align:left; width:100%; font-family:'DM Sans',sans-serif;
}
.block-btn:hover { background:var(--surface2); color:var(--text); }
.block-btn svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
.block-icon { width:28px; height:28px; border-radius:6px; background:var(--surface2); display:flex; align-items:center; justify-content:center; flex-shrink:0; }

/* ── CANVAS AREA ── */
.canvas-wrap {
  flex:1; overflow:auto;
  padding:2rem;
  background: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(255,255,255,.02) 28px),
              repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(255,255,255,.02) 28px);
}
.paper-canvas {
  width: var(--paper-w);
  min-height: 1122px;
  background: #fff;
  margin: 0 auto;
  padding: 2cm 2.2cm;
  box-shadow: 0 8px 40px rgba(0,0,0,.4);
  position: relative;
  border-radius: 3px;
}
[data-theme="light"] .canvas-wrap { background:#e8eaf3; }

/* ── BLOCKS ── */
.editor-block {
  position: relative;
  margin-bottom: 4px;
  cursor: default;
  border-radius: 4px;
  border: 2px solid transparent;
  transition: border-color .15s;
  min-height: 28px;
}
.editor-block:hover { border-color: rgba(108,99,255,.25); }
.editor-block.selected { border-color: var(--accent) !important; }

/* Block toolbar */
.block-toolbar {
  position: absolute;
  top: -36px; left: -2px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 7px;
  display: none;
  align-items: center;
  gap: 2px;
  padding: 3px;
  z-index: 50;
  box-shadow: 0 4px 16px rgba(0,0,0,.3);
  white-space: nowrap;
}
.editor-block.selected .block-toolbar { display:flex; }
.bt-btn {
  width:26px; height:26px; border-radius:5px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; background:none;
  color:var(--muted); font-size:0.75rem; font-weight:700;
  transition:all .15s;
}
.bt-btn:hover { background:var(--surface2); color:var(--text); }
.bt-btn.active { background:var(--accent); color:#fff; }
.bt-btn svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.bt-sep { width:1px; height:18px; background:var(--border); margin:0 2px; }

/* Drag handle */
.drag-handle {
  position:absolute; left:-22px; top:50%; transform:translateY(-50%);
  width:18px; height:24px; cursor:grab;
  display:none; align-items:center; justify-content:center;
  color:var(--muted); border-radius:4px;
}
.drag-handle:active { cursor:grabbing; }
.editor-block:hover .drag-handle,
.editor-block.selected .drag-handle { display:flex; }
.drag-handle svg { width:12px; height:12px; stroke:currentColor; fill:none; stroke-width:2; }

/* Delete button */
.block-delete {
  position:absolute; right:-10px; top:-10px;
  width:22px; height:22px; border-radius:50%;
  background:var(--hard); color:#fff;
  display:none; align-items:center; justify-content:center;
  cursor:pointer; font-size:0.7rem; font-weight:700;
  border:2px solid #fff; line-height:1;
  z-index:60;
}
.editor-block.selected .block-delete { display:flex; }

/* Editable content */
.block-content {
  outline:none; min-height:1em;
  word-break:break-word; white-space:pre-wrap;
}
.block-content:focus { caret-color: var(--accent); }
.block-content[data-placeholder]:empty::before {
  content: attr(data-placeholder);
  color: #bbb;
  pointer-events: none;
}

/* Block types */
.block-title     .block-content { font-size:20pt; font-weight:800; color:#111; text-align:center; line-height:1.3; }
.block-subtitle  .block-content { font-size:11pt; color:#555; text-align:center; }
.block-heading   .block-content { font-size:13pt; font-weight:700; color:#222; }
.block-text      .block-content { font-size:11pt; color:#333; line-height:1.7; }
.block-question  .block-content { font-size:11pt; color:#1a1a2e; line-height:1.6; }
.block-instruction .block-content { font-size:10pt; color:#555; font-style:italic; }
.block-footer    .block-content { font-size:9pt; color:#888; text-align:center; }
.block-divider { padding:8px 0; }
.block-divider hr { border:none; border-top:2px solid #6c63ff; }
.block-spacer { height:24px; }
.block-image img { max-width:100%; border-radius:4px; display:block; }
.block-image .img-placeholder {
  border:2px dashed #ccc; border-radius:6px;
  padding:2rem; text-align:center; color:#aaa; cursor:pointer;
  font-size:0.875rem;
}
.block-image .img-placeholder:hover { border-color:#6c63ff; color:#6c63ff; }

/* Question list block */
.block-qlist { padding:4px 0; }
.qlist-section-bar {
  background:#6c63ff; color:#fff; font-weight:700;
  font-size:11pt; text-align:center; padding:6px 12px;
  border-radius:4px; margin-bottom:8px;
}
.qlist-item {
  display:flex; gap:8px; padding:6px 4px;
  border-bottom:1px solid #f0f0f0; align-items:flex-start;
  font-size:10.5pt; color:#1a1a2e;
}
.qlist-item:nth-child(even) { background:#f9f9fc; }
.qlist-num { font-weight:700; color:#6c63ff; min-width:24px; flex-shrink:0; }
.qlist-text { flex:1; line-height:1.55; }
.qlist-marks { font-weight:700; color:#8a8fa8; font-size:9pt; white-space:nowrap; }

/* ── RIGHT PANEL – Properties ── */
.right-panel {
  width: 240px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
}
.right-panel-title { font-size:0.68rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); padding:12px 14px 8px; font-weight:700; border-bottom:1px solid var(--border); }
.prop-group { padding:12px 14px; border-bottom:1px solid var(--border); }
.prop-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); font-weight:700; margin-bottom:6px; }
.prop-row { display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap; }
.prop-input {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:6px; color:var(--text); padding:6px 9px;
  font-size:0.8rem; font-family:'DM Sans',sans-serif; outline:none;
  width:100%; transition:border-color .2s;
}
.prop-input:focus { border-color:var(--accent); }
.prop-input-sm { width:auto; flex:1; min-width:0; }
.prop-btn {
  padding:5px 10px; border-radius:6px; border:1px solid var(--border);
  background:var(--surface2); color:var(--muted); font-size:0.78rem;
  cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s;
  font-weight:600;
}
.prop-btn:hover { border-color:var(--accent); color:var(--accent); }
.prop-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.prop-color { width:32px; height:28px; border-radius:6px; border:1px solid var(--border); cursor:pointer; padding:2px; }
.no-selection { padding:1.5rem 14px; text-align:center; color:var(--muted); font-size:0.82rem; line-height:1.6; }

/* Drag over indicator */
.drag-over { border-color:var(--accent2) !important; background:rgba(0,212,170,.05); }

/* Toast */
.editor-toast {
  position:fixed; bottom:1.5rem; right:1.5rem;
  background:var(--surface); border:1px solid var(--border);
  border-left:4px solid var(--accent2);
  border-radius:8px; padding:12px 18px;
  font-size:0.85rem; font-weight:500; color:var(--text);
  box-shadow:0 8px 24px rgba(0,0,0,.3); z-index:9999;
  opacity:0; transform:translateY(8px);
  transition:opacity .3s, transform .3s;
  pointer-events:none;
}
.editor-toast.show { opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<!-- ── TOP BAR ── -->
<div class="topbar">
  <div class="topbar-logo"><span>Q</span>EXORA</div>
  <span style="color:var(--muted);font-size:0.78rem;">Paper Editor</span>
  <div class="topbar-sep"></div>
  <input type="text" class="topbar-title" id="paperTitle" value="{{ paper.title }}" placeholder="Paper title…">
  <div class="topbar-spacer"></div>

  <button class="tb-btn tb-btn-ghost" onclick="undoAction()" title="Undo (Ctrl+Z)">
    <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
    Undo
  </button>
  <button class="tb-btn tb-btn-ghost" onclick="redoAction()" title="Redo (Ctrl+Y)">
    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.5"/></svg>
    Redo
  </button>
  <div class="topbar-sep"></div>
  <button class="tb-btn tb-btn-outline" onclick="previewPrint()">
    <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    Print
  </button>
  <button class="tb-btn tb-btn-outline" onclick="savePaper()">
    <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Save
  </button>
  <button class="tb-btn tb-btn-success" onclick="exportPDF()">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export PDF
  </button>
  <div class="topbar-sep"></div>
  <a href="{{ url_for('generation.preview', paper_id=paper._id) }}" class="tb-btn tb-btn-ghost">← Back</a>
</div>

<!-- ── MAIN ── -->
<div class="editor-layout">

  <!-- LEFT: Block types -->
  <div class="left-panel">
    <div class="left-panel-title">Add Block</div>

    <button class="block-btn" onclick="addBlock('title')">
      <div class="block-icon"><svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg></div>
      Title
    </button>
    <button class="block-btn" onclick="addBlock('subtitle')">
      <div class="block-icon"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/></svg></div>
      Subtitle / Meta
    </button>
    <button class="block-btn" onclick="addBlock('heading')">
      <div class="block-icon"><svg viewBox="0 0 24 24"><path d="M4 12h16M4 6h16M4 18h10"/></svg></div>
      Section Heading
    </button>
    <button class="block-btn" onclick="addBlock('text')">
      <div class="block-icon"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="15" y2="18"/></svg></div>
      Text / Paragraph
    </button>
    <button class="block-btn" onclick="addBlock('instruction')">
      <div class="block-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
      Instructions
    </button>
    <button class="block-btn" onclick="addBlock('question')">
      <div class="block-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
      Single Question
    </button>
    <button class="block-btn" onclick="addQuestionListBlock()">
      <div class="block-icon"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>
      Question Section
    </button>
    <button class="block-btn" onclick="addBlock('footer')">
      <div class="block-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
      Footer
    </button>

    <div class="left-panel-title" style="margin-top:8px;">Decorative</div>
    <button class="block-btn" onclick="addBlock('divider')">
      <div class="block-icon"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
      Divider Line
    </button>
    <button class="block-btn" onclick="addBlock('spacer')">
      <div class="block-icon"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg></div>
      Spacer
    </button>
    <button class="block-btn" onclick="addBlock('image')">
      <div class="block-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
      Image
    </button>

    <div class="left-panel-title" style="margin-top:8px;">Actions</div>
    <button class="block-btn" onclick="clearAll()" style="color:var(--hard)">
      <div class="block-icon"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></div>
      Clear All
    </button>
  </div>

  <!-- CANVAS -->
  <div class="canvas-wrap" id="canvasWrap" onclick="handleCanvasClick(event)">
    <div class="paper-canvas" id="paperCanvas">
      <!-- blocks rendered here by JS -->
    </div>
  </div>

  <!-- RIGHT: Properties -->
  <div class="right-panel">
    <div class="right-panel-title">Properties</div>
    <div id="propsPanel">
      <div class="no-selection">
        Click a block on the canvas to edit its properties here.
      </div>
    </div>
  </div>
</div>

<!-- Hidden file input for images -->
<input type="file" id="imageUploadInput" accept="image/*" style="display:none" onchange="handleImageFile(event)">

<!-- Toast -->
<div class="editor-toast" id="editorToast"></div>

<script>
// ═══════════════════════════════════════════════════════
// QEXORA Paper Editor
// ═══════════════════════════════════════════════════════

const PAPER_ID = "{{ paper._id }}";

// Load paper data
const PAPER_DATA = {{ paper | tojson }};

// ── State ────────────────────────────────────────────
let blocks       = [];
let selectedId   = null;
let undoStack    = [];
let redoStack    = [];
let imageTargetId = null;
let dragSrcIdx   = null;

// ── Init ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  applyTheme();
  // Load saved blocks OR build from paper data
  if (PAPER_DATA.editor_blocks && PAPER_DATA.editor_blocks.length) {
    blocks = PAPER_DATA.editor_blocks;
  } else {
    blocks = buildDefaultBlocks(PAPER_DATA);
  }
  renderAll();
  pushUndo();

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey) { e.preventDefault(); undoAction(); }
    if ((e.ctrlKey||e.metaKey) && (e.key==='y'||(e.key==='z'&&e.shiftKey))) { e.preventDefault(); redoAction(); }
    if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); savePaper(); }
    if (e.key==='Escape') { deselectAll(); }
    if (e.key==='Delete' && selectedId && !isEditingText()) { deleteBlock(selectedId); }
  });
});

function applyTheme() {
  const t = localStorage.getItem('qexora_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
}

function isEditingText() {
  return document.activeElement && document.activeElement.classList.contains('block-content');
}

// ── Build default blocks from paper data ─────────────
function buildDefaultBlocks(paper) {
  const d = [];
  const now = paper.created_at || new Date().toLocaleDateString('en-IN');

  d.push(uid('title',      { content: paper.title || 'Question Paper', bold: true, align: 'center', fontSize: 20 }));
  d.push(uid('subtitle',   { content: `Subject: ${paper.subject || '—'}   |   Total Marks: ${paper.total_marks || 0}   |   Date: ${now}`, align: 'center', fontSize: 11 }));
  d.push(uid('subtitle',   { content: `Institution: ${(paper.institution_type||'').replace('_',' ')}`, align: 'center', fontSize: 10 }));
  d.push(uid('divider',    {}));
  d.push(uid('instruction',{ content: '• Answer all questions.  • Write clearly and legibly.  • Start each section on a new page.', fontSize: 10 }));
  d.push(uid('spacer',     {}));

  const sections = paper.sections || [];
  sections.forEach(sec => {
    d.push(uid('question_list', {
      section_name:        sec.section_name || 'Section',
      marks_per_question:  sec.marks_per_question || 2,
      question_type:       sec.question_type || 'short',
      questions:           (sec.questions || []).map(q => ({
        text:        q.text || '',
        co:          q.co  || '',
        bl:          q.bl  || '',
        difficulty:  q.difficulty || '',
      }))
    }));
    d.push(uid('spacer', {}));
  });

  d.push(uid('divider', {}));
  d.push(uid('footer',  { content: '*** End of Question Paper ***', align: 'center', fontSize: 9 }));
  return d;
}

function uid(type, data) {
  return { id: 'b_'+Math.random().toString(36).slice(2,9), type, ...data };
}

// ── Render ────────────────────────────────────────────
function renderAll() {
  const canvas = document.getElementById('paperCanvas');
  canvas.innerHTML = '';
  blocks.forEach((block, idx) => {
    canvas.appendChild(createBlockEl(block, idx));
  });
}

function createBlockEl(block, idx) {
  const wrap = document.createElement('div');
  wrap.className = `editor-block block-${block.type}`;
  wrap.dataset.id  = block.id;
  wrap.dataset.idx = idx;
  if (block.id === selectedId) wrap.classList.add('selected');

  // Drag handle
  const handle = document.createElement('div');
  handle.className = 'drag-handle';
  handle.innerHTML = `<svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="17" r="1"/><circle cx="15" cy="7" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="17" r="1"/></svg>`;
  handle.setAttribute('draggable','true');
  handle.addEventListener('dragstart', e => { dragSrcIdx = idx; e.dataTransfer.effectAllowed='move'; });
  wrap.appendChild(handle);

  // Block toolbar
  wrap.appendChild(buildBlockToolbar(block));

  // Delete button
  const del = document.createElement('div');
  del.className = 'block-delete';
  del.innerHTML = '✕';
  del.onclick = e => { e.stopPropagation(); deleteBlock(block.id); };
  wrap.appendChild(del);

  // Inner content
  wrap.appendChild(buildBlockInner(block));

  // Click to select
  wrap.addEventListener('click', e => { e.stopPropagation(); selectBlock(block.id); });

  // Drag events for reorder
  wrap.addEventListener('dragover', e => { e.preventDefault(); wrap.classList.add('drag-over'); });
  wrap.addEventListener('dragleave',() => wrap.classList.remove('drag-over'));
  wrap.addEventListener('drop', e => {
    e.preventDefault();
    wrap.classList.remove('drag-over');
    if (dragSrcIdx !== null && dragSrcIdx !== idx) {
      const moved = blocks.splice(dragSrcIdx, 1)[0];
      blocks.splice(idx, 0, moved);
      dragSrcIdx = null;
      renderAll();
      pushUndo();
    }
  });

  return wrap;
}

function buildBlockInner(block) {
  const type = block.type;

  if (type === 'divider') {
    const d = document.createElement('div');
    d.style.cssText = `border-top:${block.thickness||2}px solid ${block.color||'#6c63ff'};margin:6px 0;`;
    return d;
  }

  if (type === 'spacer') {
    const s = document.createElement('div');
    s.style.height = (block.height||24)+'px';
    return s;
  }

  if (type === 'image') {
    const wrap = document.createElement('div');
    if (block.src) {
      const img = document.createElement('img');
      img.src = block.src;
      img.style.cssText = `max-width:100%;display:block;margin:0 auto;border-radius:4px;`;
      img.style.textAlign = block.align || 'center';
      if(block.imgWidth)  img.style.width  = block.imgWidth+'%';
      wrap.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'img-placeholder';
      ph.innerHTML = '📷 Click to upload image';
      ph.onclick = () => { imageTargetId = block.id; document.getElementById('imageUploadInput').click(); };
      wrap.appendChild(ph);
    }
    return wrap;
  }

  if (type === 'question_list') {
    return buildQListEl(block);
  }

  // All text-based blocks
  const div = document.createElement('div');
  div.className    = 'block-content';
  div.contentEditable = 'true';
  div.spellcheck   = false;
  div.dataset.placeholder = getPlaceholder(type);
  div.textContent  = block.content || '';
  applyTextStyle(div, block);

  div.addEventListener('input', () => {
    block.content = div.textContent;
    pushUndo();
  });
  div.addEventListener('focus', () => selectBlock(block.id));
  div.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const newBlock = uid('text', { content: '', fontSize: 11 });
      const idx = blocks.findIndex(b => b.id === block.id);
      blocks.splice(idx+1, 0, newBlock);
      renderAll();
      pushUndo();
      // Focus new block
      setTimeout(() => {
        const el = document.querySelector(`[data-id="${newBlock.id}"] .block-content`);
        if (el) el.focus();
      }, 30);
    }
  });
  return div;
}

function buildQListEl(block) {
  const wrap = document.createElement('div');

  const bar = document.createElement('div');
  bar.className = 'qlist-section-bar';
  bar.contentEditable = 'true';
  bar.textContent = block.section_name || 'Section';
  bar.addEventListener('input', () => { block.section_name = bar.textContent; });
  wrap.appendChild(bar);

  (block.questions || []).forEach((q, qi) => {
    const row = document.createElement('div');
    row.className = 'qlist-item';
    row.style.background = qi%2===0 ? '' : '#f9f9fc';
    row.innerHTML = `
      <span class="qlist-num">${qi+1}.</span>
      <span class="qlist-text" contenteditable="true" onblur="updateQText('${block.id}',${qi},this.textContent)">${q.text||''}</span>
      <span class="qlist-marks">[${block.marks_per_question||2}M]</span>`;
    wrap.appendChild(row);
  });

  return wrap;
}

function updateQText(blockId, qi, text) {
  const b = blocks.find(b => b.id === blockId);
  if (b && b.questions && b.questions[qi]) {
    b.questions[qi].text = text;
    pushUndo();
  }
}

function applyTextStyle(el, block) {
  el.style.fontSize   = (block.fontSize  || 11)+'pt';
  el.style.fontWeight = block.bold   ? '700' : '400';
  el.style.fontStyle  = block.italic ? 'italic' : 'normal';
  el.style.textDecoration = block.underline ? 'underline' : 'none';
  el.style.textAlign  = block.align  || 'left';
  el.style.color      = block.color  || '#1a1a2e';
  if (block.bgColor) el.style.backgroundColor = block.bgColor;
}

function getPlaceholder(type) {
  const m = {
    title:'Paper Title…', subtitle:'Subtitle or meta info…',
    heading:'Section heading…', text:'Start typing…',
    question:'Write your question here…',
    instruction:'Instructions for students…',
    footer:'Footer text…'
  };
  return m[type] || 'Type here…';
}

// ── Block Toolbar ─────────────────────────────────────
function buildBlockToolbar(block) {
  const tb = document.createElement('div');
  tb.className = 'block-toolbar';

  const isText = !['divider','spacer','image','question_list'].includes(block.type);

  if (isText) {
    tb.appendChild(tbBtn('B', 'bold',   'bold',      block, () => toggleStyle(block,'bold')));
    tb.appendChild(tbBtn('I', 'italic', 'italic',    block, () => toggleStyle(block,'italic')));
    tb.appendChild(tbBtn('U', 'underline','underline',block, () => toggleStyle(block,'underline')));
    tb.appendChild(tbSep());

    // Alignment
    ['left','center','right'].forEach(a => {
      const b = document.createElement('button');
      b.className = 'bt-btn' + (block.align===a ? ' active' : '');
      b.title = a;
      const icons = {
        left:   '<line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/>',
        center: '<line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>',
        right:  '<line x1="3" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="6" y1="18" x2="21" y2="18"/>'
      };
      b.innerHTML = `<svg viewBox="0 0 24 24">${icons[a]}</svg>`;
      b.onclick = e => { e.stopPropagation(); block.align=a; renderBlock(block); updateProps(block); pushUndo(); };
      tb.appendChild(b);
    });
    tb.appendChild(tbSep());

    // Font size quick buttons
    ['−','＋'].forEach((lbl,i) => {
      const b = document.createElement('button');
      b.className='bt-btn'; b.textContent=lbl;
      b.onclick = e => {
        e.stopPropagation();
        block.fontSize = Math.max(7, Math.min(36, (block.fontSize||11)+(i===0?-1:1)));
        renderBlock(block); updateProps(block); pushUndo();
      };
      tb.appendChild(b);
    });
    tb.appendChild(tbSep());
  }

  // Move up / down
  const up = document.createElement('button');
  up.className='bt-btn'; up.title='Move up';
  up.innerHTML='<svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>';
  up.onclick = e => { e.stopPropagation(); moveBlock(block.id,-1); };
  const dn = document.createElement('button');
  dn.className='bt-btn'; dn.title='Move down';
  dn.innerHTML='<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>';
  dn.onclick = e => { e.stopPropagation(); moveBlock(block.id,1); };
  tb.appendChild(up); tb.appendChild(dn);

  // Duplicate
  const dup = document.createElement('button');
  dup.className='bt-btn'; dup.title='Duplicate';
  dup.innerHTML='<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  dup.onclick = e => { e.stopPropagation(); duplicateBlock(block.id); };
  tb.appendChild(dup);

  return tb;
}

function tbBtn(label, key, style, block, action) {
  const b = document.createElement('button');
  b.className = 'bt-btn' + (block[key] ? ' active' : '');
  b.textContent = label;
  b.style.fontStyle  = style==='italic'    ? 'italic'    : '';
  b.style.fontWeight = style==='bold'      ? '700'       : '';
  b.style.textDecoration = style==='underline' ? 'underline' : '';
  b.onclick = e => { e.stopPropagation(); action(); };
  return b;
}
function tbSep() {
  const s=document.createElement('div'); s.className='bt-sep'; return s;
}

// ── Select / Deselect ─────────────────────────────────
function selectBlock(id) {
  selectedId = id;
  document.querySelectorAll('.editor-block').forEach(el => {
    el.classList.toggle('selected', el.dataset.id === id);
  });
  const block = blocks.find(b => b.id===id);
  if (block) updateProps(block);
}
function deselectAll() {
  selectedId = null;
  document.querySelectorAll('.editor-block').forEach(el => el.classList.remove('selected'));
  document.getElementById('propsPanel').innerHTML =
    '<div class="no-selection">Click a block on the canvas to edit its properties here.</div>';
}
function handleCanvasClick(e) {
  if (e.target.id==='paperCanvas' || e.target.classList.contains('canvas-wrap')) deselectAll();
}

// ── Properties Panel ──────────────────────────────────
function updateProps(block) {
  const panel = document.getElementById('propsPanel');
  panel.innerHTML = '';
  const type = block.type;
  const isText = !['divider','spacer','image','question_list'].includes(type);

  if (isText) {
    panel.innerHTML += propGroup('Typography', `
      <div class="prop-label">Font Size</div>
      <div class="prop-row">
        <input type="number" class="prop-input prop-input-sm" id="pFontSize"
               value="${block.fontSize||11}" min="7" max="36"
               onchange="updateBlockProp('${block.id}','fontSize',+this.value)">
        <button class="prop-btn" onclick="updateBlockProp('${block.id}','bold',!getBool('${block.id}','bold'))" id="pBold">B</button>
        <button class="prop-btn" onclick="updateBlockProp('${block.id}','italic',!getBool('${block.id}','italic'))" id="pItalic">I</button>
        <button class="prop-btn" onclick="updateBlockProp('${block.id}','underline',!getBool('${block.id}','underline'))" id="pUnderline">U</button>
      </div>
      <div class="prop-label">Alignment</div>
      <div class="prop-row">
        ${['left','center','right','justify'].map(a=>`<button class="prop-btn${block.align===a?' active':''}" onclick="updateBlockProp('${block.id}','align','${a}')">${a[0].toUpperCase()}</button>`).join('')}
      </div>
      <div class="prop-label">Text Color</div>
      <div class="prop-row">
        <input type="color" class="prop-color" value="${block.color||'#1a1a2e'}"
               onchange="updateBlockProp('${block.id}','color',this.value)">
        <input type="color" class="prop-color" title="Background" value="${block.bgColor||'#ffffff'}"
               onchange="updateBlockProp('${block.id}','bgColor',this.value)">
      </div>
    `);
  }

  if (type === 'divider') {
    panel.innerHTML += propGroup('Divider Style', `
      <div class="prop-label">Color</div>
      <input type="color" class="prop-color" value="${block.color||'#6c63ff'}"
             onchange="updateBlockProp('${block.id}','color',this.value)">
      <div class="prop-label" style="margin-top:8px">Thickness (pt)</div>
      <input type="number" class="prop-input" value="${block.thickness||2}" min="0.5" max="8" step="0.5"
             onchange="updateBlockProp('${block.id}','thickness',+this.value)">
    `);
  }

  if (type === 'spacer') {
    panel.innerHTML += propGroup('Spacer Height', `
      <input type="range" class="prop-input" value="${block.height||24}" min="4" max="120" step="4"
             oninput="updateBlockProp('${block.id}','height',+this.value);this.nextElementSibling.textContent=this.value+'px'">
      <span style="font-size:.75rem;color:var(--muted)">${block.height||24}px</span>
    `);
  }

  if (type === 'image') {
    panel.innerHTML += propGroup('Image', `
      <button class="prop-btn" style="width:100%;margin-bottom:8px"
              onclick="imageTargetId='${block.id}';document.getElementById('imageUploadInput').click()">
        Upload / Replace Image
      </button>
      <div class="prop-label">Width %</div>
      <input type="range" class="prop-input" value="${block.imgWidth||100}" min="10" max="100" step="5"
             oninput="updateBlockProp('${block.id}','imgWidth',+this.value);this.nextElementSibling.textContent=this.value+'%'">
      <span style="font-size:.75rem;color:var(--muted)">${block.imgWidth||100}%</span>
      <div class="prop-label" style="margin-top:8px">Alignment</div>
      <div class="prop-row">
        ${['left','center','right'].map(a=>`<button class="prop-btn${block.align===a?' active':''}" onclick="updateBlockProp('${block.id}','align','${a}')">${a[0].toUpperCase()}</button>`).join('')}
      </div>
    `);
  }

  if (type === 'question_list') {
    panel.innerHTML += propGroup('Section', `
      <div class="prop-label">Marks per Question</div>
      <input type="number" class="prop-input" value="${block.marks_per_question||2}" min="1" max="20"
             onchange="updateBlockProp('${block.id}','marks_per_question',+this.value)">
      <div class="prop-label" style="margin-top:8px">Questions: ${(block.questions||[]).length}</div>
      <button class="prop-btn" style="width:100%;margin-top:4px"
              onclick="addQuestionToBlock('${block.id}')">+ Add Question</button>
    `);
  }

  // Block type info
  panel.innerHTML += propGroup('Block', `
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:4px">Type: <b style="color:var(--accent)">${type}</b></div>
    <div class="prop-row">
      <button class="prop-btn prop-btn-sm" onclick="moveBlock('${block.id}',-1)">↑ Up</button>
      <button class="prop-btn prop-btn-sm" onclick="moveBlock('${block.id}',1)">↓ Down</button>
      <button class="prop-btn prop-btn-sm" onclick="duplicateBlock('${block.id}')">⧉</button>
      <button class="prop-btn prop-btn-sm" style="color:var(--hard)" onclick="deleteBlock('${block.id}')">🗑</button>
    </div>
  `);
}

function propGroup(title, html) {
  return `<div class="prop-group"><div class="prop-label">${title}</div>${html}</div>`;
}
function getBool(id, key) {
  const b = blocks.find(b=>b.id===id); return b ? !!b[key] : false;
}

// ── Block manipulation ────────────────────────────────
function updateBlockProp(id, key, value) {
  const block = blocks.find(b=>b.id===id);
  if (!block) return;
  block[key] = value;
  renderBlock(block);
  updateProps(block);
  pushUndo();
}
function toggleStyle(block, key) {
  block[key] = !block[key];
  renderBlock(block);
  updateProps(block);
  pushUndo();
}
function renderBlock(block) {
  const idx = blocks.findIndex(b=>b.id===block.id);
  if (idx<0) return;
  const canvas = document.getElementById('paperCanvas');
  const old    = canvas.children[idx];
  if (old) canvas.replaceChild(createBlockEl(block,idx), old);
  // Re-select
  if (selectedId===block.id) {
    document.querySelector(`[data-id="${block.id}"]`)?.classList.add('selected');
  }
}
function addBlock(type, data={}) {
  const newBlock = uid(type, {
    content:   data.content || '',
    fontSize:  data.fontSize || defaultSize(type),
    bold:      data.bold  || (type==='title'||type==='heading'),
    align:     data.align || defaultAlign(type),
    color:     data.color || '#1a1a2e',
    ...data
  });
  const idx = selectedId ? blocks.findIndex(b=>b.id===selectedId)+1 : blocks.length;
  blocks.splice(idx, 0, newBlock);
  renderAll();
  pushUndo();
  selectBlock(newBlock.id);
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${newBlock.id}"] .block-content`);
    if (el) el.focus();
    document.querySelector(`[data-id="${newBlock.id}"]`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
  }, 30);
}
function addQuestionListBlock() {
  addBlock('question_list', {
    section_name: 'Part A – Short Answer',
    marks_per_question: 2,
    question_type: 'short',
    questions: [
      { text: 'Enter your first question here.', co:'', bl:'', difficulty:'easy' }
    ]
  });
}
function addQuestionToBlock(blockId) {
  const block = blocks.find(b=>b.id===blockId);
  if (!block) return;
  if (!block.questions) block.questions=[];
  block.questions.push({ text:'New question.', co:'', bl:'', difficulty:'easy' });
  renderBlock(block);
  updateProps(block);
  pushUndo();
}
function deleteBlock(id) {
  blocks = blocks.filter(b=>b.id!==id);
  if (selectedId===id) selectedId=null;
  renderAll();
  pushUndo();
  deselectAll();
}
function moveBlock(id, dir) {
  const idx = blocks.findIndex(b=>b.id===id);
  const newIdx = idx+dir;
  if (newIdx<0||newIdx>=blocks.length) return;
  [blocks[idx],blocks[newIdx]] = [blocks[newIdx],blocks[idx]];
  renderAll();
  pushUndo();
  selectBlock(id);
}
function duplicateBlock(id) {
  const idx   = blocks.findIndex(b=>b.id===id);
  const copy  = JSON.parse(JSON.stringify(blocks[idx]));
  copy.id     = 'b_'+Math.random().toString(36).slice(2,9);
  blocks.splice(idx+1,0,copy);
  renderAll();
  pushUndo();
  selectBlock(copy.id);
}
function clearAll() {
  if (!confirm('Clear all blocks and start fresh?')) return;
  blocks=[];
  renderAll();
  deselectAll();
  pushUndo();
}
function defaultSize(type) {
  return {title:20,subtitle:11,heading:13,text:11,question:11,instruction:10,footer:9}[type]||11;
}
function defaultAlign(type) {
  return {title:'center',subtitle:'center',footer:'center'}[type]||'left';
}

// ── Image upload ──────────────────────────────────────
function handleImageFile(e) {
  const file = e.target.files[0];
  if (!file || !imageTargetId) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const block = blocks.find(b=>b.id===imageTargetId);
    if (block) { block.src = ev.target.result; renderBlock(block); updateProps(block); pushUndo(); }
    imageTargetId = null;
    e.target.value='';
  };
  reader.readAsDataURL(file);
}

// ── Undo/Redo ─────────────────────────────────────────
function pushUndo() {
  undoStack.push(JSON.stringify(blocks));
  if (undoStack.length>50) undoStack.shift();
  redoStack=[];
}
function undoAction() {
  if (undoStack.length<2) return;
  redoStack.push(undoStack.pop());
  blocks = JSON.parse(undoStack[undoStack.length-1]);
  renderAll(); deselectAll(); showToast('Undo');
}
function redoAction() {
  if (!redoStack.length) return;
  const s = redoStack.pop();
  undoStack.push(s);
  blocks = JSON.parse(s);
  renderAll(); deselectAll(); showToast('Redo');
}

// ── Save ──────────────────────────────────────────────
async function savePaper() {
  const title = document.getElementById('paperTitle').value;
  const res = await fetch(`/editor/save/${PAPER_ID}`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ blocks, title })
  });
  const d = await res.json();
  showToast(d.success ? `✓ Saved ${d.saved} blocks` : '✗ Save failed');
}

// ── Export PDF ────────────────────────────────────────
async function exportPDF() {
  showToast('Generating PDF…');
  const title = document.getElementById('paperTitle').value;
  const res = await fetch(`/editor/export/${PAPER_ID}/pdf`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ blocks, title })
  });
  if (res.ok) {
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = title.replace(/\s+/g,'_')+'.pdf';
    a.click();
    URL.revokeObjectURL(url);
    showToast('✓ PDF downloaded');
  } else {
    showToast('✗ Export failed');
  }
}

// ── Print ─────────────────────────────────────────────
function previewPrint() {
  const canvas = document.getElementById('paperCanvas');
  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body{font-family:'DM Sans',sans-serif;margin:0;padding:2cm;}
      .editor-block{margin-bottom:6px;}
      .block-toolbar,.drag-handle,.block-delete{display:none!important;}
      .block-content{outline:none;}
      .qlist-item{display:flex;gap:8px;padding:5px;border-bottom:1px solid #eee;}
      .qlist-num{font-weight:700;color:#6c63ff;min-width:24px;}
      .qlist-marks{color:#888;font-size:9pt;}
      .qlist-section-bar{background:#6c63ff;color:#fff;font-weight:700;text-align:center;padding:6px;margin:8px 0;}
    </style>
  </head><body>`);
  w.document.write(canvas.innerHTML);
  w.document.write('</body></html>');
  w.document.close();
  w.focus();
  setTimeout(()=>w.print(), 500);
}

// ── Toast ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('editorToast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
